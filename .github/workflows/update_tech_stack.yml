name: Update Tech Stack

on:
  push:
    branches: [main]
    paths-ignore:
      - "assets/tech_stack.svg"
  schedule:
    - cron: "0 2 * * 0"  # Sunday 02:00 UTC
  workflow_dispatch:

jobs:
  update-tech-stack:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate Tech Stack SVG
        env:
          SNAKE_TOKEN: ${{ secrets.SNAKE_TOKEN }}
        run: python scripts/tech_stack.py --token "$SNAKE_TOKEN"

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/tech_stack.svg
          git diff --cached --quiet || git commit -m "chore: update tech stack $(date +'%Y-%m-%d')"
          git push
