name: Update Tech Stack

on:
  push:
    branches: [main]
    paths-ignore:
      - "assets/tech_stack.svg"
  schedule:
    - cron: "0 2 * * 0"  # Sunday 02:00 UTC
  workflow_dispatch:

concurrency:
  group: update-tech-stack
  cancel-in-progress: true

jobs:
  update-tech-stack:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.3.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Generate Tech Stack SVG
        env:
          SNAKE_TOKEN: ${{ secrets.SNAKE_TOKEN }}
        run: uv run python scripts/tech_stack.py

      - name: Commit if changed
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/tech_stack.svg
          git diff --cached --quiet || git commit -m "chore: update tech stack $(date +'%Y-%m-%d')"
          git push
