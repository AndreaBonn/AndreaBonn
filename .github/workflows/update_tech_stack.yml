name: Update Tech Stack

on:
  push:
    branches: [main]
    paths-ignore:
      - "assets/tech_stack.svg"
  schedule:
    - cron: "0 2 * * 0"  # Sunday 02:00 UTC
  workflow_dispatch:

concurrency:
  group: update-tech-stack
  cancel-in-progress: true

jobs:
  update-tech-stack:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v5.3.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Generate Tech Stack SVG
        env:
          SNAKE_TOKEN: ${{ secrets.SNAKE_TOKEN }}
        run: uv run python scripts/tech_stack.py

      - name: Commit if changed
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/tech_stack.svg
          git diff --cached --quiet || git commit -m "chore: update tech stack $(date +'%Y-%m-%d')"
          git push
