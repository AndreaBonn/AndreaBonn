name: Update Profile README

on:
  schedule:
    - cron: "0 7 * * *"       # tutti i giorni alle 7:00 UTC
  workflow_dispatch:
    inputs:
      force_snake:
        description: "Forza rigenerazione snake basket"
        type: boolean
        default: false

concurrency:
  group: update-profile
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Get day of week
        id: day
        run: echo "dow=$(date +%u)" >> "$GITHUB_OUTPUT"

      - name: Setup uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.3.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Snake Basket (Monday or manual)
        if: steps.day.outputs.dow == '1' || (github.event_name == 'workflow_dispatch' && inputs.force_snake == true)
        env:
          SNAKE_TOKEN: ${{ secrets.SNAKE_TOKEN }}
        run: uv run python scripts/snake_basket.py --output assets/snake_basket.gif
        continue-on-error: true

      - name: Quote of the day
        run: uv run python scripts/quote_basket.py

      - name: Today in NBA history
        run: uv run python scripts/nba_today.py

      - name: Tamagotchi and last commit
        env:
          SNAKE_TOKEN: ${{ secrets.SNAKE_TOKEN }}
        run: uv run python scripts/tamagotchi.py
        continue-on-error: true

      - name: Commit updated assets
        run: |
          git config --local user.name  "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/
          git diff --cached --quiet || git commit -m "chore: update profile $(date +'%Y-%m-%d')"
          git push
