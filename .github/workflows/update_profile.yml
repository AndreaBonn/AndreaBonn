name: Update Profile README

on:
  schedule:
    - cron: "0 7 * * *"       # tutti i giorni alle 7:00 UTC
  workflow_dispatch:
    inputs:
      force_snake:
        description: "Forza rigenerazione snake basket"
        type: boolean
        default: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get day of week
        id: day
        run: echo "dow=$(date +%u)" >> "$GITHUB_OUTPUT"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install Pillow requests

      - name: Snake Basket (Monday or manual)
        if: steps.day.outputs.dow == '1' || (github.event_name == 'workflow_dispatch' && inputs.force_snake == true)
        env:
          SNAKE_TOKEN: ${{ secrets.SNAKE_TOKEN }}
        run: python scripts/snake_basket.py --token "$SNAKE_TOKEN" --output assets/snake_basket.gif
        continue-on-error: true

      - name: Quote of the day
        run: python scripts/quote_basket.py

      - name: Today in NBA history
        run: python scripts/nba_today.py

      - name: Tamagotchi and last commit
        env:
          SNAKE_TOKEN: ${{ secrets.SNAKE_TOKEN }}
        run: python scripts/tamagotchi.py --token "$SNAKE_TOKEN"
        continue-on-error: true

      - name: Commit updated assets
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/
          git diff --cached --quiet || git commit -m "chore: update profile $(date +'%Y-%m-%d')"
          git push
