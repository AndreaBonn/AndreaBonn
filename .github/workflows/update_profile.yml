name: Update Profile README

on:
  schedule:
    - cron: "0 7 * * *"       # tutti i giorni alle 7:00 UTC
  workflow_dispatch:
    inputs:
      force_snake:
        description: "Forza rigenerazione snake basket"
        type: boolean
        default: false

concurrency:
  group: update-profile
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Get day of week
        id: day
        run: echo "dow=$(date +%u)" >> "$GITHUB_OUTPUT"

      - name: Setup uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest -q

      - name: Snake Basket (Monday or manual)
        if: steps.day.outputs.dow == '1' || (github.event_name == 'workflow_dispatch' && inputs.force_snake == true)
        env:
          SNAKE_TOKEN: ${{ secrets.SNAKE_TOKEN }}
        run: uv run python scripts/snake_basket.py --output assets/snake_basket.gif

      - name: Quote of the day
        run: uv run python scripts/quote_basket.py

      - name: Today in NBA history
        run: uv run python scripts/nba_today.py

      - name: Total stars
        env:
          SNAKE_TOKEN: ${{ secrets.SNAKE_TOKEN }}
        run: uv run python scripts/total_stars.py

      - name: Tamagotchi and last commit
        env:
          SNAKE_TOKEN: ${{ secrets.SNAKE_TOKEN }}
        run: uv run python scripts/tamagotchi.py

      - name: Commit updated assets
        run: |
          git config --local user.name  "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/snake_basket.gif assets/quote.svg assets/nba_today.svg assets/tamagotchi.svg assets/last_commit.svg assets/total_stars.svg assets/visitors.json
          git diff --cached --quiet || git commit -m "chore: update profile $(date +'%Y-%m-%d') [skip ci]"
          git push
