  <circle cx="664" cy="14" r="3" fill="#e6861a" opacity="0.8"/>
  <text x="340" y="19" text-anchor="middle" font-family="monospace" font-size="11" fill="#8b949e" letter-spacing="4" font-weight="bold">SCOREBOARD</text>

