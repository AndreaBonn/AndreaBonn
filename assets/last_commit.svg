<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 170" width="100%">
  <rect width="880" height="170" rx="10" fill="#0d1117"/>
  <rect x="1" y="1" width="878" height="168" rx="9" fill="none" stroke="#30363d" stroke-width="1.5"/>

  <!-- top bar -->
  <rect x="1" y="1" width="878" height="26" rx="9" fill="#1c2128"/>
  <rect x="1" y="18" width="878" height="9" fill="#1c2128"/>
  <line x1="1" y1="27" x2="879" y2="27" stroke="#30363d" stroke-width="1"/>
  <circle cx="16" cy="14" r="3" fill="#e6861a" opacity="0.8"/>
  <circle cx="864" cy="14" r="3" fill="#e6861a" opacity="0.8"/>
  <text x="440" y="19" text-anchor="middle" font-family="monospace" font-size="11" fill="#8b949e" letter-spacing="4" font-weight="bold">SCOREBOARD</text>

  <!-- quarter badge -->
  <rect x="418" y="44" width="44" height="22" rx="4" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
  <text x="440" y="60" text-anchor="middle" font-family="monospace" font-size="12" fill="#e6861a" font-weight="bold">Q4</text>

  <!-- left panel (commit) -->
  <text x="180" y="52" text-anchor="middle" font-family="monospace" font-size="11" fill="#8b949e" letter-spacing="1">DAYS SINCE</text>
  <text x="180" y="66" text-anchor="middle" font-family="monospace" font-size="11" fill="#8b949e" letter-spacing="1">LAST COMMIT</text>
  <rect x="120" y="78" width="120" height="48" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="180" y="112" text-anchor="middle" font-family="monospace" font-size="32" fill="#3fb950" font-weight="bold">0</text>

  <!-- basketball -->
  <circle cx="440" cy="100" r="16" fill="none" stroke="#e6861a" stroke-width="1.5"/>
  <line x1="424" y1="100" x2="456" y2="100" stroke="#e6861a" stroke-width="1"/>
  <path d="M440 84 Q448 100 440 116" fill="none" stroke="#e6861a" stroke-width="1"/>
  <path d="M440 84 Q432 100 440 116" fill="none" stroke="#e6861a" stroke-width="1"/>

  <!-- right panel (views) -->
  <text x="700" y="52" text-anchor="middle" font-family="monospace" font-size="11" fill="#8b949e" letter-spacing="1">PROFILE</text>
  <text x="700" y="66" text-anchor="middle" font-family="monospace" font-size="11" fill="#8b949e" letter-spacing="1">VIEWS</text>
  <rect x="638" y="78" width="124" height="48" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="700" y="112" text-anchor="middle" font-family="monospace" font-size="32" fill="#e6861a" font-weight="bold">42</text>

  <!-- progress bar -->
  <rect x="24" y="142" width="832" height="6" rx="3" fill="#21262d"/>
  <rect x="24" y="142" width="832" height="6" rx="3" fill="#3fb950"/>

  <!-- status label -->
  <text x="440" y="160" text-anchor="middle" font-family="monospace" font-size="9" fill="#3fb950">fresh commit!</text>
</svg>